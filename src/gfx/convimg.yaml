palettes:
  - name: global_palette
    fixed-entries:
      - color: {index: 0, r: 255, g: 0, b: 255}
      - color: {index: 1, r: 0, g: 0, b: 0}
      - color: {index: 2, r: 255, g: 255, b: 255}
    images: automatic

converts:
  - name: sprites
    palette: global_palette
    transparent-color-index: 0
    compress: zx0
    images:
     - assets/spr_logo.png
     - assets/spr_relogic.png
     - assets/spr_tree.png

outputs:
  - type: appvar
    name: traspr
    include-file: traspr.h
    source-format: c
    palettes:
      - global_palette
    converts:
      - sprites